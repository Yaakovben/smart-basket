  <!-- רקע טורקיז קבוע - מונע מסך לבן בחזרה מ-WhatsApp/Waze ל-PWA -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #14B8A6;
      min-height: 100%;
    }
    /* רקע #root נשאר טורקיז גם אחרי טעינה - אם ה-JS מת כשהאפליקציה ב-background
       וחוזרים, הלקוח יראה את הצבע של האפליקציה ולא מסך לבן ריק. */
    #root {
      min-height: 100vh;
      min-height: 100dvh;
      background: #14B8A6;
    }
    /* כשהתמה נטענת ולוקחת פיקוד, מסירים את הרקע מתחת התוכן */
    body.app-loaded #root {
      background: var(--app-bg, transparent);
    }
  </style>
  <!-- Force unregister old service workers (v2.0 migration) -->
  <script>
    (function() {
      var forceReset = location.search.indexOf('force-reset') > -1;
      var migrated = localStorage.getItem('sw_migrated_v2');
      if ((forceReset || !migrated) && 'serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          if (regs.length > 0 || forceReset) {
            var unregisterAll = regs.length > 0
              ? Promise.all(regs.map(function(r) { return r.unregister(); }))
              : Promise.resolve();
            unregisterAll.then(function() {
              if ('caches' in window) {
                caches.keys().then(function(names) {
                  Promise.all(names.map(function(n) { return caches.delete(n); })).then(function() {
                    localStorage.clear();
                    localStorage.setItem('sw_migrated_v2', '1');
                    if (forceReset) {
                      location.href = '/';
                    } else {
                      location.reload();
                    }
                  });
                });
              } else {
                localStorage.clear();
                localStorage.setItem('sw_migrated_v2', '1');
                if (forceReset) {
                  location.href = '/';
                } else {
                  location.reload();
                }
              }
            });
          }
        });
      }
    })();
  </script>
  <!-- Listen for SW activation to reload with fresh content -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'SW_ACTIVATED') {
          location.reload();
        }
      });
    }
  </script>
  </head>
  <body>
    <!-- מסך טעינה ראשוני - מינימליסטי ונקי -->
    <div id="initial-loader">
      <!-- Halo עדין מאחורי הלוגו - vibe של "פועם" בלי עומס ויזואלי -->
      <div class="splash-halo"></div>

      <!-- לוגו מרכזי - הסל. ה-stroke הזוהר זז סביבו = הטעינה -->
      <div class="splash-logo-wrap">
        <svg class="splash-logo" viewBox="0 0 512 512" aria-hidden="true">
          <!-- זהה ל-favicon.svg - לוגו אחיד בכל האפליקציה -->
          <defs>
            <linearGradient id="splashBg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#14B8A6"/>
              <stop offset="100%" stop-color="#0D9488"/>
            </linearGradient>
            <filter id="splashShadow">
              <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.12"/>
            </filter>
          </defs>
          <rect width="512" height="512" rx="112" fill="url(#splashBg)"/>
          <g filter="url(#splashShadow)">
            <path d="M150 228 L176 368 C178 380 187 392 200 392 L312 392 C325 392 334 380 336 368 L362 228 C363 222 359 217 353 217 L159 217 C153 217 149 222 150 228 Z" fill="white"/>
            <path d="M192 210 C192 178 210 142 256 142 C302 142 320 178 320 210" stroke="white" stroke-width="22" fill="none" stroke-linecap="round"/>
          </g>
          <path d="M216 286 L248 318 L304 258" stroke="#14B8A6" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <!-- שם המותג - גדול, נקי -->
      <div class="splash-brand">Smart Basket</div>

      <!-- Fallback - מוצג רק אחרי 15ש' או error -->
      <div id="load-error" class="splash-error">
        <p class="err-title">הטעינה נכשלה</p>
        <p id="error-text" class="err-detail"></p>
        <button onclick="location.href='/clear.html'" class="err-btn">נסה שוב</button>
      </div>

      <script>
        // Error handler גלובלי
        window.onerror = function(msg, url, line) {
          var error = document.getElementById('load-error');
          var errorText = document.getElementById('error-text');
          if (error && errorText) {
            errorText.textContent = msg + ' (line ' + line + ')';
            error.style.display = 'block';
          }
          return false;
        };
        setTimeout(function() {
          var error = document.getElementById('load-error');
          if (error) error.style.display = 'block';
        }, 15000);
      </script>

      <style>
        #initial-loader {
          position: fixed; inset: 0;
          display: flex; flex-direction: column;
          align-items: center; justify-content: center;
          background: #14B8A6;
          z-index: 9999;
          overflow: hidden;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        }

        /* Halo עדין מאחור - גם נותן עומק */
        .splash-halo {
          position: absolute;
          width: 280px; height: 280px;
          border-radius: 50%;
          background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 70%);
          animation: haloPulse 3s ease-in-out infinite;
        }
        @keyframes haloPulse {
          0%,100% { transform: scale(0.95); opacity: 0.7; }
          50%     { transform: scale(1.08); opacity: 1; }
        }

        /* מעטפת הלוגו */
        .splash-logo-wrap {
          position: relative;
          width: 120px; height: 120px;
          filter: drop-shadow(0 12px 28px rgba(0,0,0,0.22));
          animation: logoFloat 3.4s ease-in-out infinite;
        }
        @keyframes logoFloat {
          0%,100% { transform: translateY(0); }
          50%     { transform: translateY(-5px); }
        }
        .splash-logo { width: 100%; height: 100%; display: block; }

/* שם המותג - גדול, אלגנטי */
        .splash-brand {
          margin-top: 28px;
          color: #fff;
          font-size: 26px;
          font-weight: 800;
          letter-spacing: 0.5px;
          text-shadow: 0 2px 12px rgba(0,0,0,0.18);
          animation: fadeUp 0.6s ease-out 0.1s both;
        }
        .splash-msg {
          margin-top: 6px;
          color: rgba(255,255,255,0.85);
          font-size: 14px;
          font-weight: 500;
          letter-spacing: 0.2px;
          animation: fadeUp 0.6s ease-out 0.25s both;
        }
        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(8px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        /* Error fallback */
        .splash-error {
          display: none;
          position: absolute; bottom: 16%;
          text-align: center; padding: 0 24px;
          animation: fadeUp 0.4s ease-out both;
        }
        .splash-error .err-title { color: #fff; font-size: 14px; margin: 0 0 6px; font-weight: 600; }
        .splash-error .err-detail { color: rgba(255,255,255,0.7); font-size: 11px; margin: 0 0 14px; direction: ltr; word-break: break-all; }
        .splash-error .err-btn {
          background: #fff; color: #0D9488; border: none;
          padding: 12px 28px; border-radius: 12px;
          font-size: 14px; font-weight: 700; cursor: pointer;
          box-shadow: 0 4px 14px rgba(0,0,0,0.15);
        }
      </style>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
