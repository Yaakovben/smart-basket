  <!-- רקע טורקיז קבוע - מונע מסך לבן בחזרה מ-WhatsApp/Waze ל-PWA -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #14B8A6;
      min-height: 100%;
    }
    /* רקע #root נשאר טורקיז גם אחרי טעינה - אם ה-JS מת כשהאפליקציה ב-background
       וחוזרים, הלקוח יראה את הצבע של האפליקציה ולא מסך לבן ריק. */
    #root {
      min-height: 100vh;
      min-height: 100dvh;
      background: #14B8A6;
    }
    /* כשהתמה נטענת ולוקחת פיקוד, מסירים את הרקע מתחת התוכן */
    body.app-loaded #root {
      background: var(--app-bg, transparent);
    }
  </style>
  <!-- Force unregister old service workers (v2.0 migration) -->
  <script>
    (function() {
      var forceReset = location.search.indexOf('force-reset') > -1;
      var migrated = localStorage.getItem('sw_migrated_v2');
      if ((forceReset || !migrated) && 'serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          if (regs.length > 0 || forceReset) {
            var unregisterAll = regs.length > 0
              ? Promise.all(regs.map(function(r) { return r.unregister(); }))
              : Promise.resolve();
            unregisterAll.then(function() {
              if ('caches' in window) {
                caches.keys().then(function(names) {
                  Promise.all(names.map(function(n) { return caches.delete(n); })).then(function() {
                    localStorage.clear();
                    localStorage.setItem('sw_migrated_v2', '1');
                    if (forceReset) {
                      location.href = '/';
                    } else {
                      location.reload();
                    }
                  });
                });
              } else {
                localStorage.clear();
                localStorage.setItem('sw_migrated_v2', '1');
                if (forceReset) {
                  location.href = '/';
                } else {
                  location.reload();
                }
              }
            });
          }
        });
      }
    })();
  </script>
  <!-- Listen for SW activation to reload with fresh content -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'SW_ACTIVATED') {
          location.reload();
        }
      });
    }
  </script>
  </head>
  <body>
    <!-- מסך טעינה ראשוני - עיצוב בוגר, אחיד עם האפליקציה -->
    <div id="initial-loader" style="
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center top, #2DD4BF 0%, #14B8A6 50%, #0D9488 100%);
      z-index: 9999;
      overflow: hidden;
    ">
      <!-- לוגו במרכז עליון - אופציונלי, אבל נותן אנקור ויזואלי -->
      <svg class="loader-logo" width="80" height="80" viewBox="0 0 512 512" style="margin-bottom: 32px;">
        <defs>
          <linearGradient id="lg-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.7"/>
          </linearGradient>
        </defs>
        <rect width="512" height="512" rx="112" fill="url(#lg-bg)"/>
        <path d="M150 228 L176 368 C178 380 187 392 200 392 L312 392 C325 392 334 380 336 368 L362 228 C363 222 359 217 353 217 L159 217 C153 217 149 222 150 228 Z" fill="#14B8A6"/>
        <path d="M192 210 C192 178 210 142 256 142 C302 142 320 178 320 210" stroke="#14B8A6" stroke-width="22" fill="none" stroke-linecap="round"/>
        <path d="M216 286 L248 318 L304 258" stroke="white" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>

      <!-- ===== כרטיס לבן עם הודעת טעינה (בסגנון התמונה) ===== -->
      <div class="splash-card">
        <!-- אייקון סל בריבוע מעוגל - הברנדינג של הכרטיס -->
        <div class="splash-card-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
            <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12L8.1 13h7.45c.75 0 1.41-.41 1.75-1.03L21.7 4H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
          </svg>
        </div>
        <!-- טקסט + נקודות -->
        <div class="splash-card-body">
          <p id="splash-message">טוען את האפליקציה...</p>
          <div class="splash-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>

      <script>
        // אם יש משתמש שמור - מציגים הודעה אישית יותר במקום הגנרית
        try {
          var raw = localStorage.getItem('cached_user');
          if (raw) {
            var name = JSON.parse(raw).name;
            var msgEl = document.getElementById('splash-message');
            if (name && msgEl) { msgEl.textContent = 'טוען את הרשימות של ' + name + '...'; }
          }
        } catch(e) {}
      </script>

      <!-- Fallback error message (hidden by default, shown after 15s or on error) -->
      <div id="load-error" style="display: none; position: absolute; bottom: 20%; text-align: center; padding: 0 20px;">
        <p style="color: white; font-size: 14px; margin-bottom: 8px;">הטעינה נכשלה</p>
        <p id="error-text" style="color: rgba(255,255,255,0.7); font-size: 11px; margin-bottom: 12px; direction: ltr; word-break: break-all;"></p>
        <button onclick="location.href='/clear.html'" style="
          background: white;
          color: #14B8A6;
          border: none;
          padding: 12px 24px;
          border-radius: 8px;
          font-size: 14px;
          font-weight: 600;
          cursor: pointer;
        ">נסה שוב</button>
      </div>

      <script>
        // Global error handler - catch any JS errors
        window.onerror = function(msg, url, line) {
          var error = document.getElementById('load-error');
          var errorText = document.getElementById('error-text');
          if (error && errorText) {
            errorText.textContent = msg + ' (line ' + line + ')';
            error.style.display = 'block';
          }
          return false;
        };
        // Show error message after 15 seconds if app hasn't loaded
        setTimeout(function() {
          var loader = document.getElementById('initial-loader');
          var error = document.getElementById('load-error');
          if (loader && error) {
            error.style.display = 'block';
          }
        }, 15000);
      </script>

      <style>
        /* לוגו עליון - breathe עדין */
        .loader-logo {
          filter: drop-shadow(0 8px 24px rgba(0,0,0,0.22));
          animation: logoBreathe 3.2s ease-in-out infinite;
        }
        @keyframes logoBreathe {
          0%, 100% { transform: translateY(0) scale(1); }
          50%      { transform: translateY(-4px) scale(1.04); }
        }

        /* ===== כרטיס הטעינה הלבן - בסגנון התמונה ===== */
        .splash-card {
          display: flex;
          align-items: center;
          gap: 14px;
          padding: 16px 22px;
          border-radius: 18px;
          background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(255,255,255,0.9));
          box-shadow: 0 12px 36px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,1);
          backdrop-filter: blur(14px);
          -webkit-backdrop-filter: blur(14px);
          position: relative;
          overflow: hidden;
          min-width: 240px;
          animation: cardEnter 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes cardEnter {
          from { opacity: 0; transform: translateY(12px) scale(0.94); }
          to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        /* shimmer - גל אור שעובר על הכרטיס - האפקט היפה שזז */
        .splash-card::before {
          content: '';
          position: absolute;
          inset: 0;
          background: linear-gradient(110deg, transparent 30%, rgba(20,184,166,0.12) 50%, transparent 70%);
          animation: shimmerSweep 2.4s ease-in-out infinite;
          pointer-events: none;
        }
        @keyframes shimmerSweep {
          0%   { transform: translateX(-100%); }
          100% { transform: translateX(100%); }
        }

        /* ריבוע האייקון בכרטיס */
        .splash-card-icon {
          flex-shrink: 0;
          width: 44px;
          height: 44px;
          border-radius: 13px;
          background: linear-gradient(135deg, #14B8A6, #0D9488);
          display: flex;
          align-items: center;
          justify-content: center;
          box-shadow: 0 4px 12px rgba(20,184,166,0.4), inset 0 1px 0 rgba(255,255,255,0.25);
          animation: iconBreathe 2.4s ease-in-out infinite;
        }
        @keyframes iconBreathe {
          0%, 100% { transform: scale(1); }
          50%      { transform: scale(1.06); }
        }

        /* גוף הכרטיס - טקסט ונקודות */
        .splash-card-body {
          display: flex;
          flex-direction: column;
          gap: 6px;
          min-width: 0;
        }
        #splash-message {
          margin: 0;
          font-size: 16px;
          font-weight: 800;
          color: #0F172A;
          letter-spacing: 0.2px;
          white-space: nowrap;
        }
        .splash-dots {
          display: flex;
          gap: 6px;
          align-items: center;
        }
        .splash-dots span {
          width: 6px;
          height: 6px;
          border-radius: 50%;
          background: #14B8A6;
          animation: dotBounce 1.2s ease-in-out infinite;
        }
        .splash-dots span:nth-child(1) { animation-delay: 0s; }
        .splash-dots span:nth-child(2) { animation-delay: 0.16s; }
        .splash-dots span:nth-child(3) { animation-delay: 0.32s; }
        @keyframes dotBounce {
          0%, 80%, 100% { transform: translateY(0) scale(0.65); opacity: 0.5; }
          40%           { transform: translateY(-5px) scale(1); opacity: 1; }
        }
      </style>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
