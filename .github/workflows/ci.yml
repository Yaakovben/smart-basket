name: CI

on:
  push:
    branches: [main, non-prod]
  pull_request:
    branches: [main, non-prod]

# בטל ריצות ישנות אם push חדש הגיע על אותה ענף - חוסך דקות CI.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client:
    name: Client build & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # ערכי placeholder לבדיקת build בלבד - לא מחוברים לסביבה אמיתית
          VITE_API_URL: https://ci-placeholder.invalid/api
          VITE_SOCKET_URL: https://ci-placeholder.invalid
          VITE_GOOGLE_CLIENT_ID: ci-placeholder

  server-api:
    name: API Server build & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
